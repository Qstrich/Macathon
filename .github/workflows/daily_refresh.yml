name: Daily scrape + refresh Supabase cache

on:
  workflow_dispatch:
  schedule:
    # Daily at 07:00 UTC (~2am Toronto during EST; adjust as needed)
    - cron: "0 7 * * *"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ALLOW_LIVE_EXTRACTION: "true"
      HEADLESS: "true"
      GEMINI_MIN_DELAY_SECONDS: "12"
      GEMINI_MAX_RETRIES: "6"
      FORCE_SCRAPE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend deps
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install scraper deps + Chromium
        working-directory: ./scraper
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Scrape + extract (Gemini) + upload to Supabase
        working-directory: .
        run: |
          python -m backend.refresh_cache 

