<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicSense - Local Government News</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <div class="logo">
        <h1>🏛️ CivicSense</h1>
        <p>Your AI-powered local government news feed</p>
      </div>
    </header>

    <!-- Search Section -->
    <section class="search-section">
      <div class="search-box">
        <input 
          type="text" 
          id="cityInput" 
          placeholder="Enter your city (e.g., Hamilton, Ontario)"
          autocomplete="off"
        >
        <button id="searchBtn">Get Latest News</button>
      </div>
      <p class="hint">Enter any Canadian city to see what your local council has been up to</p>
    </section>

    <!-- Loading State -->
    <div id="loadingState" class="loading-state hidden">
      <div class="spinner"></div>
      <p class="loading-text">Searching for latest council minutes...</p>
      <p class="loading-subtext">This may take 30-60 seconds</p>
    </div>

    <!-- Error State -->
    <div id="errorState" class="error-state hidden">
      <div class="error-icon">⚠️</div>
      <h3 class="error-title">Oops!</h3>
      <p class="error-message" id="errorMessage"></p>
      <button class="retry-btn" onclick="location.reload()">Try Again</button>
    </div>

    <!-- Results Section -->
    <section id="resultsSection" class="results-section hidden">
      <div class="results-header">
        <h2 id="cityName"></h2>
        <p class="meeting-info" id="meetingInfo"></p>
        <div class="document-links">
          <div class="pdf-link-container" id="pdfLinkContainer">
            <span class="link-label">📄 Parsed Document:</span>
            <a href="#" id="pdfLink" class="document-link pdf-link" target="_blank"></a>
          </div>
          <div class="source-link-container" id="sourceLinkContainer">
            <span class="link-label">🔗 Source Page:</span>
            <a href="#" id="sourceLink" class="document-link source-link" target="_blank"></a>
          </div>
        </div>
      </div>

      <div class="motions-grid" id="motionsGrid">
        <!-- Motion cards will be inserted here -->
      </div>
    </section>

    <!-- Modal for full details -->
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="modal-header">
          <span class="modal-category" id="modalCategory"></span>
          <h3 id="modalTitle"></h3>
        </div>
        <div class="modal-body">
          <p class="modal-summary" id="modalSummary"></p>
          <div class="modal-status" id="modalStatus"></div>
          <div class="modal-tags" id="modalTags"></div>
          <div class="modal-full-text" id="modalFullText"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
